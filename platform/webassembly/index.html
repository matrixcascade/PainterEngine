<!DOCTYPE html>
<!-- saved from url=(0073)http://www.painterengine.com/main/instances/instance2021081801/index.html -->
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<style type="text/css">
			* {
				margin: 0;
			}

			.container {
				display: flex;
				width: 100vw;
				height: 100vh;
				overflow: hidden;
				justify-content: center;
				align-items: center;
			}

			.progressContainer{
				width: 70vw;
				height: 1.3em;
				border: 1px solid #000;
				padding: 1px;
			}

			#canvas {
				display: block;
			}

			#rotateOverlay {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: rgba(0, 0, 0, 0.88);
				z-index: 9999;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				color: #fff;
				font-family: sans-serif;
				text-align: center;
				gap: 1.2em;
			}

			#rotateOverlay.visible {
				display: flex;
			}

			#rotateOverlay .rotate-icon {
				font-size: 4em;
				animation: rotate-hint 1.8s ease-in-out infinite;
				display: inline-block;
			}

			#rotateOverlay p {
				font-size: 1.1em;
				opacity: 0.9;
				margin: 0;
				padding: 0 2em;
				line-height: 1.6;
			}

			@keyframes rotate-hint {
				0%   { transform: rotate(0deg); }
				40%  { transform: rotate(-90deg); }
				60%  { transform: rotate(-90deg); }
				100% { transform: rotate(0deg); }
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div id="rotateOverlay">
				<span class="rotate-icon">&#8635;</span>
				<p>请旋转您的设备至横屏模式<br>Please rotate your device to landscape</p>
			</div>
			<canvas id="canvas" style="display: none;" oncontextmenu="event.preventDefault()" width="960"
				height="480"></canvas>
			<div id="progressBar">
				<p>loading ...</p>
				<div class="progressContainer">
					<div id="loaded" style="transition-duration: 0.2s;background-color: #000000;height: 100%;min-width: 2em;width: 0%; color: #fff;text-align: center;">
						0%
					</div>
				</div>
			</div>
			
			<script type="text/javascript">
				var Module = {
					canvas: (function() {
						return document.getElementById('canvas');
					})()
				};
				
				var event = new CustomEvent('progress');
				
				function lookProgress() {
					var total = 0;
					var loaded = 0;
					if (Module.dataFileDownloads) {
				
						for (var key in Module.dataFileDownloads) {
							total += Module.dataFileDownloads[key].total;
							loaded += Module.dataFileDownloads[key].loaded;
						}
						if (total != 0) {
							current = Math.round(loaded * 100 / total);
							if (current !== event.precent) {
								event.precent = current;
								dispatchEvent(event);
							}
							if (current === 100)
								return;
				
						}
					}
					setTimeout(lookProgress, 100);
				}
				lookProgress();
				
				
				var progress = document.getElementById('loaded');
				var progressBar = document.getElementById('progressBar');
				addEventListener("progress",function(e){
					progress.style.width =  e.precent + '%';
					progress.innerHTML = e.precent + '%';
					if(e.precent === 100){
						Module.canvas.style.display = 'block';
						progressBar.style.display = 'none';
						fitCanvasToViewport();
						observeCanvas();
						if (isMobileDevice() && isLandscapeCanvas()) {
							tryLockLandscape();
						}
					}
				});
				
				var open_file = function(e)
				{
  					const file_reader = new FileReader();
  					file_reader.onload = (event) =>
					{
						const uint8Arr = new Uint8Array(event.target.result);
    					const num_bytes = uint8Arr.length * uint8Arr.BYTES_PER_ELEMENT;
    					const data_ptr = Module._malloc(num_bytes);
    					const data_on_heap = new Uint8Array(Module.HEAPU8.buffer, data_ptr, num_bytes);
    					data_on_heap.set(uint8Arr);
    					const res = Module.ccall('load_file', 'number', ['number', 'number'], [data_on_heap.byteOffset, uint8Arr.length]);
  					};
  				file_reader.readAsArrayBuffer(e.target.files[0]);
				};

				function fitCanvasToViewport() {
					var c = Module.canvas;
					if (c.style.display === 'none') return;
					var cw = c.width;
					var ch = c.height;
					var vw, vh;
					if (document.fullscreenElement || document.webkitFullscreenElement) {
						vw = screen.width;
						vh = screen.height;
					} else {
						vw = window.innerWidth;
						vh = window.innerHeight;
					}
					var scale = Math.min(vw / cw, vh / ch);
					c.style.width = Math.floor(cw * scale) + 'px';
					c.style.height = Math.floor(ch * scale) + 'px';
				}

				function enterFullscreen() {
					var docEl = document.documentElement;
					var requestFS = docEl.requestFullscreen
						|| docEl.webkitRequestFullscreen
						|| docEl.mozRequestFullScreen;
					if (requestFS) {
						requestFS.call(docEl).then(function() {
							if (screen.orientation && screen.orientation.lock) {
								return screen.orientation.lock('landscape').catch(function(){});
							}
						}).then(function() {
							fitCanvasToViewport();
						}).catch(function(){});
					}
				}

				function observeCanvas() {
					var c = Module.canvas;
					var lastW = c.width, lastH = c.height;
					var observer = new MutationObserver(function(mutations) {
						if (c.width !== lastW || c.height !== lastH) {
							lastW = c.width;
							lastH = c.height;
							fitCanvasToViewport();
						}
					});
					observer.observe(c, { attributes: true, attributeFilter: ['width', 'height'] });
				}

				function isMobileDevice() {
					return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
						|| (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);
				}

				function isLandscapeCanvas() {
					var c = Module.canvas;
					return c.width > c.height;
				}

				function isDeviceLandscape() {
					if (screen.orientation) {
						return screen.orientation.type.startsWith('landscape');
					}
					return (window.orientation === 90 || window.orientation === -90);
				}

				var rotateOverlay = document.getElementById('rotateOverlay');

				function showRotatePrompt() {
					rotateOverlay.classList.add('visible');
				}

				function hideRotatePrompt() {
					rotateOverlay.classList.remove('visible');
				}

				function tryLockLandscape() {
					if (isDeviceLandscape()) {
						enterFullscreen();
					} else {
						showRotatePrompt();
					}
				}

				function handleOrientationChange() {
					if (!isMobileDevice() || !isLandscapeCanvas()) return;
					if (isDeviceLandscape()) {
						hideRotatePrompt();
						enterFullscreen();
					} else {
						showRotatePrompt();
					}
				}

				if (screen.orientation) {
					screen.orientation.addEventListener('change', function() {
						handleOrientationChange();
						fitCanvasToViewport();
					});
				} else {
					window.addEventListener('orientationchange', function() {
						handleOrientationChange();
						fitCanvasToViewport();
					});
				}
				window.addEventListener('resize', function() {
					handleOrientationChange();
					fitCanvasToViewport();
				});

				document.addEventListener('fullscreenchange', fitCanvasToViewport);
				document.addEventListener('webkitfullscreenchange', fitCanvasToViewport);

			</script>
			<script src="PainterEngine.js"></script>
			
		</div>

	</body>
</html>
